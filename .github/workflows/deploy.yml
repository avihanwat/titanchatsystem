name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: titan-social-media-crm
  ZONE: us-central1-b
  INSTANCE: titanchatsystem

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload code to VM
        run: |
          tar czf /tmp/titanchat.tar.gz --exclude='.git' --exclude='venv' --exclude='__pycache__' --exclude='.pytest_cache' .
          gcloud compute scp /tmp/titanchat.tar.gz ${{ env.INSTANCE }}:/tmp/titanchat.tar.gz \
            --project=${{ env.PROJECT_ID }} \
            --zone=${{ env.ZONE }} \
            --tunnel-through-iap

      - name: Deploy on VM
        run: |
          gcloud compute ssh ${{ env.INSTANCE }} \
            --project=${{ env.PROJECT_ID }} \
            --zone=${{ env.ZONE }} \
            --tunnel-through-iap \
            --command="sudo bash /opt/titanchat/repo/deploy/deploy.sh"

      - name: Health check
        run: |
          gcloud compute ssh ${{ env.INSTANCE }} \
            --project=${{ env.PROJECT_ID }} \
            --zone=${{ env.ZONE }} \
            --tunnel-through-iap \
            --command="sudo bash /opt/titanchat/repo/deploy/healthcheck.sh"
